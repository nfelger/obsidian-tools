name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Cache Obsidian binary
        uses: actions/cache@v4
        with:
          path: .obsidian-cache
          key: obsidian-${{ runner.os }}-latest

      - name: Set up virtual display
        run: |
          sudo apt-get install -y herbstluftwm

          export DISPLAY=:99
          echo "DISPLAY=$DISPLAY" >> "$GITHUB_ENV"
          Xvfb :99 -screen 0 1280x1024x24 -ac +extension GLX -noreset &
          sleep 2
          herbstluftwm &
          sleep 1

      - name: Run E2E tests
        run: npm run test:e2e
